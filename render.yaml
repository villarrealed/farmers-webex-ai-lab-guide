services:
  - type: web
    name: farmers-webex-ai-lab-guide
    env: static
    staticPublishPath: .
    buildCommand: ""

  - type: web
    name: farmers-insurance-mcp-server
    runtime: node
    rootDir: mcp-server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
